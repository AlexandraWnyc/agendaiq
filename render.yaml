# Render.com deployment config.
# Push this repo to GitHub, then in Render: New → Blueprint → point at the repo.
# Render will read this file and create the service + disk automatically.

services:
  - type: web
    name: agendaiq
    runtime: python
    plan: starter              # $7/mo — bump to "standard" if you need more RAM
    region: oregon             # closest to Miami is "ohio"; change if preferred
    buildCommand: pip install -r requirements.txt
    # NOTE: workers=1 is REQUIRED. The analyze pipeline uses an in-memory
    # JOBS dict keyed by job_id. With >1 worker the SSE stream request
    # often lands on a worker that doesn't have that job → progress box
    # stays empty even though analysis is running. threads=8 gives plenty
    # of concurrency (SSE connections are I/O-bound).
    startCommand: python -c "from db import init_db; init_db()" ; gunicorn app_v6:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 300
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: agendaiq-data
      mountPath: /data         # matches DATA_DIR below
      sizeGB: 1                # plenty for SQLite + pdf_cache; bump later if needed
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHON_VERSION
        value: "3.11"
      # Set these in the Render dashboard (do NOT commit secrets to the repo):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false            # shared demo password; remove once SSO is in

# Nightly backups: Render cron jobs can't share a disk with a web service,
# so backups run inside the web service itself on an internal timer once
# BACKUP_BUCKET + AWS creds are set. See backup_db.py + notifications.py.
